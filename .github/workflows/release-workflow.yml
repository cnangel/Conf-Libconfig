      package_name: ${{ needs.basic-build.outputs.package_name }}
      cc_files_hash_id: ${{ needs.basic-build.outputs.cc_files_hash_id }}
      deb_path: ${{ needs.basic-build.outputs.deb_path }}
      rpm_path: ${{ needs.basic-build.outputs.rpm_path }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Before Build Hook
        run: |
          sed -i 's/^Version:.*/Version:        ${{ env.version_id }}/' "${{ env.package_name }}.spec"

      - name: Restore RPM Cache
        id: rpm_cache_restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.rpm_path }}
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-${{ github.job }}

      - if: steps.rpm_cache_restore.outputs.cache-hit != 'true'
        name: Build RPM Package
        id: rpm_build
        uses: cnangel/build-rpm-action@master
        with:
          docker_image: cnangel/fc38
          extra_build_deps: libconfig-devel perl-devel perl-generators perl-ExtUtils-MakeMaker perl-ExtUtils-PkgConfig perl-Test-Deep perl-Test-Exception perl-Test-Warn

      - if: steps.rpm_cache_restore.outputs.cache-hit != 'true'
        name: Save RPM Cache
        id: rpm_cache_save
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.rpm_path }}
          key: ${{ steps.rpm_cache_restore.outputs.cache-primary-key }}

      - name: Install JQ and JO
        run: |
          sudo apt update
          sudo apt install -y jq jo

      - name: Set Output Info
        id: output_info
        run: |
          export PATH=~/.local/bin:$PATH
          echo "rpm_packages=$(find ${{ env.rpm_path }} -name '*.rpm' 2>/dev/null | jo -a | jq -r 'join(",")')" >> $GITHUB_OUTPUT


  rpm-build-fc44:
    name: Create fc44 Release
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [basic-build]
    outputs:
      rpm_packages: ${{ steps.output_info.outputs.rpm_packages }}
    env:
      our_date: ${{ needs.basic-build.outputs.our_date }}
      git_hash: ${{ needs.basic-build.outputs.git_hash }}
      version_id: ${{ needs.basic-build.outputs.version_id }}
      package_name: ${{ needs.basic-build.outputs.package_name }}
      cc_files_hash_id: ${{ needs.basic-build.outputs.cc_files_hash_id }}
      deb_path: ${{ needs.basic-build.outputs.deb_path }}
      rpm_path: ${{ needs.basic-build.outputs.rpm_path }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Before Build Hook
        run: |
          sed -i 's/^Version:.*/Version:        ${{ env.version_id }}/' "${{ env.package_name }}.spec"

      - name: Restore RPM Cache
        id: rpm_cache_restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.rpm_path }}
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-${{ github.job }}

      - if: steps.rpm_cache_restore.outputs.cache-hit != 'true'
        name: Build RPM Package
        id: rpm_build
        uses: cnangel/build-rpm-action@master
        with:
          docker_image: fedora:44
          extra_build_deps: rpm-build rpmdevtools yum-utils gcc-c++ libconfig-devel perl-devel perl-generators perl-ExtUtils-MakeMaker perl-ExtUtils-PkgConfig perl-Test-Deep perl-Test-Exception perl-Test-Warn

      - if: steps.rpm_cache_restore.outputs.cache-hit != 'true'
        name: Save RPM Cache
        id: rpm_cache_save
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.rpm_path }}
          key: ${{ steps.rpm_cache_restore.outputs.cache-primary-key }}

      - name: Install JQ and JO
        run: |
          sudo apt update
          sudo apt install -y jq jo

      - name: Set Output Info
        id: output_info
        run: |
          export PATH=~/.local/bin:$PATH
          echo "rpm_packages=$(find ${{ env.rpm_path }} -name '*.rpm' 2>/dev/null | jo -a | jq -r 'join(",")')" >> $GITHUB_OUTPUT


  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [deb-build-focal, deb-build-resolute, deb-build-jammy, deb-build-noble, rpm-build-el7, rpm-build-el8, rpm-build-el9, rpm-build-el10-amd64, rpm-build-el10-arm64, rpm-build-fc38, rpm-build-fc44, basic-build]
    env:
      our_date: ${{ needs.basic-build.outputs.our_date }}
      git_hash: ${{ needs.basic-build.outputs.git_hash }}
      version_id: ${{ needs.basic-build.outputs.version_id }}
      package_name: ${{ needs.basic-build.outputs.package_name }}
      cc_files_hash_id: ${{ needs.basic-build.outputs.cc_files_hash_id }}
      deb_path: ${{ needs.basic-build.outputs.deb_path }}
      rpm_path: ${{ needs.basic-build.outputs.rpm_path }}
      deb_focal_packages: ${{ needs.deb-build-focal.outputs.deb_packages }}
      deb_resolute_packages: ${{ needs.deb-build-resolute.outputs.deb_packages }}
      deb_jammy_packages: ${{ needs.deb-build-jammy.outputs.deb_packages }}
      deb_noble_packages: ${{ needs.deb-build-noble.outputs.deb_packages }}
      el7_rpm_packages: ${{ needs.rpm-build-el7.outputs.rpm_packages }}
      el8_rpm_packages: ${{ needs.rpm-build-el8.outputs.rpm_packages }}
      el9_rpm_packages: ${{ needs.rpm-build-el9.outputs.rpm_packages }}
      fc38_rpm_packages: ${{ needs.rpm-build-fc38.outputs.rpm_packages }}
      el10_amd64_rpm_packages: ${{ needs.rpm-build-el10-amd64.outputs.rpm_packages }}
      el10_arm64_rpm_packages: ${{ needs.rpm-build-el10-arm64.outputs.rpm_packages }}
      fc44_rpm_packages: ${{ needs.rpm-build-fc44.outputs.rpm_packages }}


    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Restore DEB Cache Ubuntu Focal
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.deb_path }}/focal
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-deb-build-focal
      - name: Restore DEB Cache Ubuntu Resolute
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.deb_path }}/resolute
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-deb-build-resolute
      - name: Restore DEB Cache Ubuntu Jammy
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.deb_path }}/jammy
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-deb-build-jammy
      - name: Restore DEB Cache Ubuntu Noble
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.deb_path }}/noble
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-deb-build-noble
      - name: Restore RPM Cache for el7
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.rpm_path }}
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-rpm-build-el7
      - name: Restore RPM Cache for el8
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.rpm_path }}
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-rpm-build-el8
      - name: Restore RPM Cache for el9
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.rpm_path }}
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-rpm-build-el9
      - name: Restore RPM Cache for fc38
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.rpm_path }}
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-rpm-build-fc38
      - name: Restore RPM Cache for fc44
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.rpm_path }}
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-rpm-build-fc44
      - name: Restore RPM Cache for el10 amd64
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.rpm_path }}
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-rpm-build-el10-amd64
      - name: Restore RPM Cache for el10 arm64
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.rpm_path }}
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-rpm-build-el10-arm64

      - name: Collect Release Assets
        id: collect_assets
        run: |
          ASSETS="README.md"
          for v in deb_focal_packages deb_resolute_packages deb_jammy_packages deb_noble_packages \
                   el7_rpm_packages el8_rpm_packages el9_rpm_packages \
                   el10_amd64_rpm_packages el10_arm64_rpm_packages \
                   fc38_rpm_packages fc44_rpm_packages; do
            val="${!v}"
            if [ -n "$val" ]; then
              # split comma-separated values
              IFS=',' read -ra PKGS <<< "$val"
              for p in "${PKGS[@]}"; do
                p=$(echo "$p" | xargs)  # trim whitespace
                if [ -n "$p" ]; then
                  ASSETS="$ASSETS"$'\n'"$p"
                fi
              done
            fi
          done
          echo "ASSETS<<EOF" >> $GITHUB_OUTPUT
          echo "$ASSETS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Release ${{ github.ref_name }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          body_path: Changes.md
          files: ${{ steps.collect_assets.outputs.ASSETS }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false