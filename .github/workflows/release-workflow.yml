---
name: Create Release

on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      # Push events to matching v*, i.e. v1.0, v20.15.10
      - 'v*'

jobs:
  basic-build:
    name: Basic Build
    runs-on: ubuntu-latest
    outputs:
      our_date: ${{ env.our_date }}
      git_hash: ${{ env.git_hash }}
      cc_files_hash_id: ${{ env.cc_files_hash_id }}
      version_id: ${{ env.version_id }}
      package_name: ${{ env.package_name }}
      deb_path: ${{ env.deb_path }}
      rpm_path: ${{ env.rpm_path }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Set Variables
        run: |
          version_id=${GITHUB_REF_NAME:1}
          package_name=${GITHUB_REPOSITORY##*/}
          sha_short=$(git rev-parse --short "$GITHUB_SHA")
          cc_hash_id=${{ hashFiles('Libconfig.xs', 'Makefile.PL', 'lib/Conf/Libconfig.pm', '.github/workflows/release-workflow.yml') }}
          echo "our_date=$(/bin/date -u "+%Y%m%d")" >> $GITHUB_ENV
          echo "git_hash=$sha_short" >> $GITHUB_ENV
          echo "version_id=$version_id" >> $GITHUB_ENV
          echo "package_name=$package_name" >> $GITHUB_ENV
          echo "cc_files_hash_id=${cc_hash_id:0:10}" >> $GITHUB_ENV
          echo "deb_path=debian/artifacts" >> $GITHUB_ENV
          echo "rpm_path=rpmbuild/RPMS" >> $GITHUB_ENV
      - name: Run Unit Tests
        run: |
          sudo apt update
          sudo apt install -y libconfig-dev libextutils-pkgconfig-perl libtest-deep-perl libtest-exception-perl libtest-warn-perl
          perl Makefile.PL
          make
          make test

  deb-build-resolute:
    name: Create Ubuntu Resolute Release
    runs-on: ubuntu-24.04
    continue-on-error: true
    needs: [basic-build]
    outputs:
      deb_packages: ${{ steps.output_info.outputs.deb_packages }}
    env:
      our_date: ${{ needs.basic-build.outputs.our_date }}
      git_hash: ${{ needs.basic-build.outputs.git_hash }}
      version_id: ${{ needs.basic-build.outputs.version_id }}
      package_name: ${{ needs.basic-build.outputs.package_name }}
      cc_files_hash_id: ${{ needs.basic-build.outputs.cc_files_hash_id }}
      deb_path: ${{ needs.basic-build.outputs.deb_path }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Restore DEB Cache Ubuntu Resolute
        id: deb_cache_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.deb_path }}/resolute
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-${{ github.job }}

      - if: steps.deb_cache_restore.outputs.cache-hit != 'true'
        name: Build DEB Package Ubuntu Resolute
        id: deb_build_resolute
        uses: cnangel/build-deb-action@master
        with:
          before_build_hook: |
            dch --maintmaint --newversion ${{ env.version_id }}-1 "version ${{ env.version_id }}"
            dch --maintmaint --release ""
          buildpackage_opts: --build=binary
          extra_build_deps: libconfig-dev libextutils-pkgconfig-perl
          is_output_all_files: false

      - if: steps.deb_cache_restore.outputs.cache-hit != 'true'
        name: Move DEB to distro subdir
        run: |
          sudo chown -R $(id -u):$(id -g) ${{ env.deb_path }}/
          mkdir -p ${{ env.deb_path }}/resolute
          mv ${{ env.deb_path }}/*.deb ${{ env.deb_path }}/resolute/
          for f in ${{ env.deb_path }}/resolute/*.deb; do mv "$f" "${{ env.deb_path }}/resolute/resolute-$(basename "$f")"; done

      - if: steps.deb_cache_restore.outputs.cache-hit != 'true'
        name: Save DEB Cache Ubuntu Resolute
        id: deb_cache_save
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.deb_path }}/resolute
          key: ${{ steps.deb_cache_restore.outputs.cache-primary-key }}

      - name: Install JQ and JO
        run: |
          sudo apt update
          sudo apt install -y jq jo

      - name: Set Output Info
        id: output_info
        run: |
          export PATH=~/.local/bin:$PATH
          echo "deb_packages=$(find ${{ env.deb_path }}/resolute -name '*.deb' 2>/dev/null | jo -a | jq -r 'join(",")')" >> $GITHUB_OUTPUT

  deb-build-focal:
    name: Create Ubuntu Focal Release
    runs-on: ubuntu-22.04
    continue-on-error: true
    needs: [basic-build]
    outputs:
      deb_packages: ${{ steps.output_info.outputs.deb_packages }}
    env:
      our_date: ${{ needs.basic-build.outputs.our_date }}
      git_hash: ${{ needs.basic-build.outputs.git_hash }}
      version_id: ${{ needs.basic-build.outputs.version_id }}
      package_name: ${{ needs.basic-build.outputs.package_name }}
      cc_files_hash_id: ${{ needs.basic-build.outputs.cc_files_hash_id }}
      deb_path: ${{ needs.basic-build.outputs.deb_path }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Restore DEB Cache Ubuntu Focal
        id: deb_cache_restore
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.deb_path }}/focal
          key: ${{ runner.os }}-${{ env.package_name }}-${{ env.version_id }}-${{ env.cc_files_hash_id }}-${{ github.job }}

      - if: steps.deb_cache_restore.outputs.cache-hit != 'true'
        name: Build DEB Package Ubuntu Focal via pbuilder
        run: |
          sudo apt update
          sudo apt install -y pbuilder ubuntu-dev-tools devscripts
          dch --maintmaint --newversion ${{ env.version_id }}-1 "version ${{ env.version_id }}"
          dch --maintmaint --release ""
          pbuilder-dist focal create --mirror http://archive.ubuntu.com/ubuntu
          (cd .. && dpkg-source -b ${{ env.package_name }})
          mkdir -p ./pbuilder-result
          pbuilder-dist focal build --buildresult ./pbuilder-result ../*.dsc
          sudo chown -R $(id -u):$(id -g) ./pbuilder-result
          mkdir -p ${{ env.deb_path }}/focal
          cp ./pbuilder-result/*.deb ${{ env.deb_path }}/focal/
          for f in ${{ env.deb_path }}/focal/*.deb; do mv "$f" "${{ env.deb_path }}/focal/focal-$(basename "$f")"; done

      - if: steps.deb_cache_restore.outputs.cache-hit != 'true'
        name: Save DEB Cache Ubuntu Focal
        id: deb_cache_save
        uses: actions/cache/save@v5
        with:
          path: |
            ${{ env.deb_path }}/focal
          key: ${{ steps.deb_cache_restore.outputs.cache-primary-key }}

      - name: Install JQ and JO
        run: |
          sudo apt update
          sudo apt install -y jq jo

      - name: Set Output Info
        id: output_info
        run: |
          export PATH=~/.local/bin:$PATH
          echo "deb_packages=$(find ${{ env.deb_path }}/focal -name '*.deb' 2>/dev/null | jo -a | jq -r 'join(",")')" >> $GITHUB_OUTPUT

